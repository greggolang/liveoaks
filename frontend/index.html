<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets content fill behind the notch/dynamic island.
         We handle safe areas in CSS/JS so nothing important gets clipped. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Live Oaks Tennis Club</title>

    <!-- Match the app's dark green nav so Android/Chrome tints the browser chrome -->
    <meta name="theme-color" content="#2c4a2e" />

    <!-- iOS PWA / Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent = status bar is transparent; nav background fills behind it.
         Combined with padding-top: env(safe-area-inset-top) on the sticky nav this
         gives a seamless full-bleed green header all the way to the top edge. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Live Oaks" />
    <link rel="icon" href="/favicon.ico" sizes="any">
    <!-- iOS ignores webmanifest icons — must be a dedicated apple-touch-icon PNG. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
