name: Install Stalwart Mail Server

# Run ONCE manually: Actions → "Install Stalwart Mail Server" → Run workflow
# Uses webgoserver.com so you can test fully before touching liveoakstennis.com DNS.
on:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 172.236.228.11
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: scripts/stalwart-config.toml,scripts/stalwart-mail.service
          target: /tmp/stalwart-files/

      - name: Install and start Stalwart Mail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 172.236.228.11
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo ">>> Fetching latest Stalwart release tag..."
            ARCH="x86_64-unknown-linux-musl"
            TAG=$(curl -fsSL "https://api.github.com/repos/stalwartlabs/mail-server/releases/latest" \
                  | grep '"tag_name"' | sed 's/.*"tag_name": "\(.*\)".*/\1/')
            echo "Downloading $TAG..."
            mkdir -p /tmp/stalwart-dl
            curl -fsSL \
              "https://github.com/stalwartlabs/mail-server/releases/download/${TAG}/stalwart-mail-${ARCH}.tar.gz" \
              -o /tmp/stalwart-dl/stalwart.tar.gz
            tar -xzf /tmp/stalwart-dl/stalwart.tar.gz -C /tmp/stalwart-dl/
            install -m 755 /tmp/stalwart-dl/stalwart-mail /usr/local/bin/stalwart-mail
            echo "Installed: $(stalwart-mail --version 2>&1 || true)"

            id -u stalwart &>/dev/null || useradd -r -s /sbin/nologin stalwart
            mkdir -p /etc/stalwart /var/db/stalwart/blobs /var/db/stalwart/acme

            cp /tmp/stalwart-files/scripts/stalwart-config.toml /etc/stalwart/config.toml
            cp /tmp/stalwart-files/scripts/stalwart-mail.service /etc/systemd/system/stalwart-mail.service

            chown stalwart:stalwart /etc/stalwart/config.toml
            chmod 600 /etc/stalwart/config.toml
            chown -R stalwart:stalwart /var/db/stalwart /etc/stalwart

            if command -v ufw &>/dev/null; then
              ufw allow 25/tcp   comment "SMTP"
              ufw allow 587/tcp  comment "SMTP Submission"
              ufw allow 993/tcp  comment "IMAPS"
              ufw allow 443/tcp  comment "HTTPS Webmail"
              ufw --force enable
            fi

            sudo -u postgres psql -d liveoaks \
              -f /opt/liveoaks/migrations/074_mail_accounts.sql 2>/dev/null || true

            sudo -u postgres psql -d liveoaks -c "
              INSERT INTO mail_accounts (address, role_label, display_name) VALUES
                ('president@webgoserver.com', 'President (test)', 'Liveoaks President - TEST'),
                ('secretary@webgoserver.com', 'Secretary (test)', 'Liveoaks Secretary - TEST'),
                ('treasurer@webgoserver.com', 'Treasurer (test)', 'Liveoaks Treasurer - TEST')
              ON CONFLICT (address) DO NOTHING;"

            systemctl daemon-reload
            systemctl enable stalwart-mail
            systemctl restart stalwart-mail
            sleep 4
            systemctl status stalwart-mail --no-pager

            echo ""
            echo "============================================================"
            echo "  STALWART INSTALLED"
            echo "============================================================"
            echo "1. Add DNS A record:  mail.webgoserver.com -> 172.236.228.11"
            echo "2. Once DNS is set, visit: https://mail.webgoserver.com/admin"
            echo "3. In your app admin panel -> Mail Accounts -> Reset Password"
            echo "   for each test account, then log in at https://mail.webgoserver.com"
            echo "============================================================"
