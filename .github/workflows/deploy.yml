name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_APP_VERSION: "1.${{ github.run_number }}"
          VITE_APP_SHA: ${{ github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build -ldflags "-X main.Version=1.${{ github.run_number }}" -o liveoaks . && go build -o resetpw ./cmd/resetpw/

      - name: Copy binary and migrations to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 172.236.228.11
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: liveoaks,resetpw,migrations
          target: /opt/liveoaks/

      - name: Run migrations and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 172.236.228.11
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JWT_SECRET,SMTP_PASS,TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN,TWILIO_FROM
          script: |
            chmod +x /opt/liveoaks/liveoaks

            # --- TEMPORARY: authorize admin client keys for root (remove after first successful login) ---
            mkdir -p /root/.ssh && chmod 700 /root/.ssh
            BITVISE_KEY="ssh-rsa "
            ED25519_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMWhX2XfNFMplpO0V3Vjie+qReMLNgdEbsATbnz7ba2s greg@howardsmail.com"
            HOME_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDWlCEprNNOIVaf6pgBq+eWDgrSxWTTvwyABvT4UqibI home"
            for K in "$BITVISE_KEY" "$ED25519_KEY" "$HOME_KEY"; do
              grep -qF "$K" /root/.ssh/authorized_keys 2>/dev/null || echo "$K" >> /root/.ssh/authorized_keys
            done
            chmod 600 /root/.ssh/authorized_keys
            # --- end temporary block ---

            # Add SMTP env vars to service file if not already present
            grep -q 'SMTP_HOST' /etc/systemd/system/liveoaks.service || sed -i '/Environment=PORT/a Environment=SMTP_HOST=mail.webgoserver.com\nEnvironment=SMTP_PORT=587\nEnvironment=SMTP_USER=admin@webgoserver.com\nEnvironment=SMTP_FROM=admin@webgoserver.com\nEnvironment=SMTP_PASS=placeholder\nEnvironment=SITE_URL=http://liveoaks.webgoserver.com' /etc/systemd/system/liveoaks.service

            # Add Stripe env vars to service file if not already present
            grep -q 'STRIPE_SECRET_KEY' /etc/systemd/system/liveoaks.service || sed -i '/Environment=SMTP_PASS/a Environment=STRIPE_SECRET_KEY=placeholder\nEnvironment=STRIPE_WEBHOOK_SECRET=placeholder\nEnvironment=STRIPE_PUBLISHABLE_KEY=placeholder' /etc/systemd/system/liveoaks.service

            # Add Twilio (SMS) env vars to service file if not already present
            grep -q 'TWILIO_ACCOUNT_SID' /etc/systemd/system/liveoaks.service || sed -i '/Environment=STRIPE_PUBLISHABLE_KEY/a Environment=TWILIO_ACCOUNT_SID=placeholder\nEnvironment=TWILIO_AUTH_TOKEN=placeholder\nEnvironment=TWILIO_FROM=placeholder' /etc/systemd/system/liveoaks.service

            # Harden SSH: disable password auth, only allow key-based login
            sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
            sed -i 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
            systemctl reload sshd

            # Tune fail2ban: longer window, higher threshold, shorter ban
            printf '[DEFAULT]\nbantime = 120\nfindtime = 300\nmaxretry = 10\n\n[sshd]\nenabled = true\n' > /etc/fail2ban/jail.local
            systemctl restart fail2ban

            mkdir -p /opt/liveoaks/uploads/documents /opt/liveoaks/uploads/photos
            # NOTE: resetpw is a manual recovery tool only. It runs
            # `UPDATE users SET password_hash=...` with NO WHERE clause, so it
            # overwrites EVERY member's password with the default. It must never
            # run automatically on deploy — doing so wiped all passwords on every
            # push. Run it by hand on the server only when an emergency reset of
            # all accounts is genuinely intended.
            chmod +x /opt/liveoaks/resetpw
            sed -i "s|Environment=JWT_SECRET=.*|Environment=JWT_SECRET=$JWT_SECRET|" /etc/systemd/system/liveoaks.service
            sed -i "s|Environment=SMTP_PASS=.*|Environment=SMTP_PASS=$SMTP_PASS|" /etc/systemd/system/liveoaks.service
            sed -i "s|Environment=STRIPE_SECRET_KEY=.*|Environment=STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY|" /etc/systemd/system/liveoaks.service
            sed -i "s|Environment=STRIPE_WEBHOOK_SECRET=.*|Environment=STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET|" /etc/systemd/system/liveoaks.service
            sed -i "s|Environment=STRIPE_PUBLISHABLE_KEY=.*|Environment=STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY|" /etc/systemd/system/liveoaks.service
            sed -i "s|Environment=TWILIO_ACCOUNT_SID=.*|Environment=TWILIO_ACCOUNT_SID=$TWILIO_ACCOUNT_SID|" /etc/systemd/system/liveoaks.service
            sed -i "s|Environment=TWILIO_AUTH_TOKEN=.*|Environment=TWILIO_AUTH_TOKEN=$TWILIO_AUTH_TOKEN|" /etc/systemd/system/liveoaks.service
            sed -i "s|Environment=TWILIO_FROM=.*|Environment=TWILIO_FROM=$TWILIO_FROM|" /etc/systemd/system/liveoaks.service
            # Transfer ownership of all public tables to the app user so ALTER TABLE
            # migrations succeed. Tables created by postgres during initial setup
            # are not owned by the liveoaks user and will fail ALTER TABLE otherwise.
            sudo -u postgres psql -d liveoaks -c "DO \$\$ DECLARE r RECORD; BEGIN FOR r IN SELECT tablename FROM pg_tables WHERE schemaname = 'public' AND tableowner != 'liveoaks' LOOP EXECUTE 'ALTER TABLE public.' || quote_ident(r.tablename) || ' OWNER TO liveoaks'; END LOOP; END\$\$;" 2>/dev/null || true
            systemctl daemon-reload
            systemctl restart liveoaks
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
