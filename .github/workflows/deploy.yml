name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build -o liveoaks . && go build -o resetpw ./cmd/resetpw/

      - name: Copy binary and migrations to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 172.236.228.11
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: liveoaks,resetpw,migrations
          target: /opt/liveoaks/

      - name: Run migrations and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 172.236.228.11
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JWT_SECRET
          script: |
            chmod +x /opt/liveoaks/liveoaks

            # Add SMTP env vars to service file if not already present
            grep -q 'SMTP_HOST' /etc/systemd/system/liveoaks.service || sed -i '/Environment=PORT/a Environment=SMTP_HOST=smtp-relay.gmail.com\nEnvironment=SMTP_PORT=587\nEnvironment=SMTP_FROM=admin@liveoakstennis.com\nEnvironment=SITE_URL=http://liveoaks.webgoserver.com' /etc/systemd/system/liveoaks.service

            # Harden SSH: disable password auth, only allow key-based login
            sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
            sed -i 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
            systemctl reload sshd

            # Tune fail2ban: longer window, higher threshold, shorter ban
            printf '[DEFAULT]\nbantime = 120\nfindtime = 300\nmaxretry = 10\n\n[sshd]\nenabled = true\n' > /etc/fail2ban/jail.local
            systemctl restart fail2ban

            sudo -u postgres psql -d liveoaks -f /opt/liveoaks/migrations/004_password_resets.sql 2>/dev/null || true
            sudo -u postgres psql -d liveoaks -f /opt/liveoaks/migrations/005_activity_log.sql 2>/dev/null || true
            sudo -u postgres psql -d liveoaks -f /opt/liveoaks/migrations/006_fix_permissions.sql 2>/dev/null || true
            chmod +x /opt/liveoaks/resetpw
            DATABASE_URL="postgres://liveoaks:liveoaks2026@localhost/liveoaks" /opt/liveoaks/resetpw
            sed -i "s|Environment=JWT_SECRET=.*|Environment=JWT_SECRET=$JWT_SECRET|" /etc/systemd/system/liveoaks.service
            systemctl daemon-reload
            systemctl restart liveoaks
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
