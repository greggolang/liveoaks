name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_APP_VERSION: "1.${{ github.run_number }}"
          VITE_APP_SHA: ${{ github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build -ldflags "-X main.Version=1.${{ github.run_number }}" -o liveoaks . && go build -o resetpw ./cmd/resetpw/

      - name: Copy binary and migrations to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 172.236.228.11
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: liveoaks,resetpw,migrations
          target: /opt/liveoaks/

      - name: Run migrations and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 172.236.228.11
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JWT_SECRET,SMTP_PASS
          script: |
            chmod +x /opt/liveoaks/liveoaks

            # --- TEMPORARY: authorize Bitvise client key for root (remove after first successful login) ---
            mkdir -p /root/.ssh && chmod 700 /root/.ssh
            BITVISE_KEY="ssh-rsa "
            grep -qF "$BITVISE_KEY" /root/.ssh/authorized_keys 2>/dev/null || echo "$BITVISE_KEY" >> /root/.ssh/authorized_keys
            chmod 600 /root/.ssh/authorized_keys
            # --- end temporary block ---

            # Add SMTP env vars to service file if not already present
            grep -q 'SMTP_HOST' /etc/systemd/system/liveoaks.service || sed -i '/Environment=PORT/a Environment=SMTP_HOST=smtp.gmail.com\nEnvironment=SMTP_PORT=587\nEnvironment=SMTP_USER=admin@liveoakstennis.com\nEnvironment=SMTP_FROM=admin@liveoakstennis.com\nEnvironment=SMTP_PASS=placeholder\nEnvironment=SITE_URL=http://liveoaks.webgoserver.com' /etc/systemd/system/liveoaks.service

            # Harden SSH: disable password auth, only allow key-based login
            sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
            sed -i 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
            systemctl reload sshd

            # Tune fail2ban: longer window, higher threshold, shorter ban
            printf '[DEFAULT]\nbantime = 120\nfindtime = 300\nmaxretry = 10\n\n[sshd]\nenabled = true\n' > /etc/fail2ban/jail.local
            systemctl restart fail2ban

            for f in /opt/liveoaks/migrations/*.sql; do
              sudo -u postgres psql -d liveoaks -f "$f" 2>/dev/null || true
            done
            mkdir -p /opt/liveoaks/uploads/documents /opt/liveoaks/uploads/photos
            chmod +x /opt/liveoaks/resetpw
            DATABASE_URL="postgres://liveoaks:liveoaks2026@localhost/liveoaks" /opt/liveoaks/resetpw
            sed -i "s|Environment=JWT_SECRET=.*|Environment=JWT_SECRET=$JWT_SECRET|" /etc/systemd/system/liveoaks.service
            sed -i "s|Environment=SMTP_PASS=.*|Environment=SMTP_PASS=$SMTP_PASS|" /etc/systemd/system/liveoaks.service
            systemctl daemon-reload
            systemctl restart liveoaks
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
