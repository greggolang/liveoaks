name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build -o liveoaks .

      - name: Copy binary and migrations to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 172.236.228.11
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: liveoaks,migrations
          target: /opt/liveoaks/

      - name: Run migrations and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 172.236.228.11
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JWT_SECRET
          script: |
            chmod +x /opt/liveoaks/liveoaks
            sudo -u postgres psql -d liveoaks -f /opt/liveoaks/migrations/003_fix_passwords.sql
            sed -i "s|Environment=JWT_SECRET=.*|Environment=JWT_SECRET=$JWT_SECRET|" /etc/systemd/system/liveoaks.service
            systemctl daemon-reload
            systemctl restart liveoaks
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
